<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XOFKanji-pi Scanner</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script type="module" src="{{ url_for('static', filename='app.js') }}"></script>
</head>
<body>
    <div class="scanner-page">
        <div class="scanner-card container">
            <div class="scanner-header">
                <div class="scanner-brand">
                    <div class="scanner-logo-row">
                        <img class="brand-icon" src="{{ url_for('static', filename='icons/fox.svg') }}" alt="">
                        <span class="scanner-logo">XOFKanji-pi</span>
                    </div>
                    <span class="scanner-subtitle">Scanner</span>
                </div>
                <a href="/dashboard" class="scanner-dash-link">
                    <img class="nav-icon-svg" src="{{ url_for('static', filename='icons/dashboard.svg') }}" alt="">
                    Dashboard
                </a>
            </div>

            <form action="/upload" method="post" enctype="multipart/form-data">
                <div class="drop-zone" id="drop-zone">
                    <div class="drop-zone-content">
                        <img class="drop-zone-svg" src="{{ url_for('static', filename='icons/image.svg') }}" alt="">
                        <p class="drop-zone-text">Drop an image here or click to browse</p>
                        <p class="drop-zone-hint">Supports JPG, PNG, WebP — max 10 MB</p>
                    </div>
                    <input type="file" id="image-input" name="image" accept="image/*" required>
                </div>

                <div class="scanner-options">
                    <div class="form-group">
                        <label for="direction-select">
                            <img class="label-icon-svg" src="{{ url_for('static', filename='icons/japan.svg') }}" alt="">
                            Text Direction
                        </label>
                        <select id="direction-select" name="direction">
                            <option value="horizontal">Horizontal (Left → Right)</option>
                            <option value="vertical">Vertical (Top → Bottom)</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="scanner-submit">
                    <img class="submit-icon-svg" src="{{ url_for('static', filename='icons/magnifier.svg') }}" alt="">
                    Scan &amp; Add to Database
                </button>
            </form>
        </div>
    </div>
    <div id="jisho-modal" class="jisho-modal-overlay" style="display:none;">
        <div class="jisho-modal-box">
            <div class="jisho-modal-header">
                <h3 id="jisho-modal-title" class="jisho-modal-title"></h3>
                <button id="jisho-modal-close" class="jisho-modal-close">&times;</button>
            </div>
            <div id="jisho-modal-body" class="jisho-modal-body"></div>
        </div>
    </div>
</body>
</html>
